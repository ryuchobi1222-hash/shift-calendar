<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="希望休" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>希望休</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <p class="label">希望休Webアプリ</p>
      <h1 id="monthTitle">----</h1>
    </header>

    <section class="monthButtons">
      <button id="prevBtn" type="button">前月</button>
      <button id="todayBtn" type="button">今月</button>
      <button id="nextBtn" type="button">翌月</button>
    </section>

    <section class="summary">
      <div><span>希望休</span><strong id="requestCount">0日</strong></div>
      <div><span>出勤</span><strong id="workCount">0日</strong></div>
      <div><span>平日希望休</span><strong id="weekdayRequestCount">0日</strong></div>
      <div><span>残り</span><strong id="remainCount">10日</strong></div>
    </section>

    <section class="limitBox">
      <span>希望休上限</span>
      <div>
        <input id="limitInput" type="number" min="0" max="31" inputmode="numeric" />
        <span>日まで</span>
      </div>
    </section>

    <section class="weekdays">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </section>

    <section id="calendar" class="calendar"></section>

    <section class="actions">
      <button id="lineBtn" class="primary" type="button">LINEで送る</button>
      <button id="copyBtn" type="button">コピー</button>
      <button id="pdfBtn" type="button">PDF</button>
      <button id="clearBtn" class="danger" type="button">リセット</button>
    </section>

    <section class="themeBox">
      <span>色テーマ</span>
      <div class="themes">
        <button data-theme="nature" type="button">🌿</button>
        <button data-theme="blue" type="button">💙</button>
        <button data-theme="red" type="button">❤️</button>
        <button data-theme="gray" type="button">🩶</button>
        <button data-theme="purple" type="button">🟣</button>
      </div>
    </section>

    <textarea id="copyText" readonly></textarea>

    <p class="hint">
      日付をタップすると「出勤 ⇄ 希望休」に切り替わります。土日は固定休です。長押しでメモを入れられます。
    </p>
  </main>

  <div id="memoModal" class="modal hidden">
    <div class="modalInner">
      <h2 id="memoTitle">メモ</h2>
      <textarea id="memoInput" placeholder="例：🏥 病院、🎂 誕生日、✈️ 旅行"></textarea>
      <div class="modalActions">
        <button id="deleteMemoBtn" class="danger" type="button">削除</button>
        <button id="cancelMemoBtn" type="button">閉じる</button>
        <button id="saveMemoBtn" class="primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden">保存しました</div>

  <script src="app.js"></script>
</body>
</html>
